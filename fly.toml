# fly.toml app configuration file generated for evanmcneely on 2026-04-16T18:20:41-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'evanmcneely'
primary_region = 'ord'

[build]
  [build.args]
    GO_VERSION = '1.25.0'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
